{% extends "index.html" %}

{% block content %}
<div class="card">

<h2>Linear Regression - Health Prediction</h2>
<p>Predict weight based on age and height.</p>

<form method="POST">

    <label>Age:</label>
    <input type="number" name="age" step="any" required>

    <label>Height (cm):</label>
    <input type="number" name="height" step="any" required>

    <br><br>
    <button type="submit">Predict</button>

</form>


{% if prediction %}

    <h3>Predicted Weight:</h3>
    <p>{{ prediction }} kg</p>
</div>
{% endif %}


{% if graph %}
<div class="card">
    <h3>Graph</h3>
    <img src="data:image/png;base64,{{ graph }}" style="max-width:100%;">
</div>
{% endif %}

{% endblock %}
